<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="quiz-card">
        <h1>Tech & General Quiz</h1>
        <p class="intro-text">Validate your knowledge across multiple domains in this structured assessment.</p>

        <form action="#">
            <div class="question-box">
                <h3>1. What is the official capital of India?</h3>
                <label class="option-group"><input type="radio" name="q1" value="mumbai"> Mumbai</label>
                <label class="option-group"><input type="radio" name="q1" value="delhi"> New Delhi</label>
                <label class="option-group"><input type="radio" name="q1" value="kolkata"> Kolkata</label>
            </div>

            <div class="question-box">
                <h3>2. Which of these are core programming languages?</h3>
                <label class="option-group"><input type="checkbox" name="q2" value="python"> Python (High Level)</label>
                <label class="option-group"><input type="checkbox" name="q2" value="html"> HTML (Markup)</label>
                <label class="option-group"><input type="checkbox" name="q2" value="java"> Java (Object
                    Oriented)</label>
            </div>

        <footer class="designer-copyright">
        © Designed & Developed by <span>Uday</span>
    </footer>
</body>
</html>
